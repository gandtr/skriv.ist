name: Deploy

run-name: Deploy to Cloudflare Pages

# Explicit, manual deploy — does NOT fire on push (family convention:
# deploys are always dispatched by hand, never automatic).
#
#   gh workflow run deploy.yml
#
# Or from the Actions UI: "Deploy" → "Run workflow".
#
# Publishes the static site to the Cloudflare Pages project `skriv-ist`.
# The project is created on first run if it doesn't exist yet.
#
# Secrets (repo or org level):
#   CLOUDFLARE_API_TOKEN  — needs Cloudflare Pages:Edit
#   CLOUDFLARE_ACCOUNT_ID

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-pages
  cancel-in-progress: false

env:
  PAGES_PROJECT: skriv-ist

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Assemble site bundle
        run: |
          mkdir -p dist
          cp index.html robots.txt dist/
          cp -r media dist/media

      - name: Ensure Pages project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          # JSON lookup (wrangler >=4.64 supports --json) instead of parsing
          # the human table output, which is brittle across CLI versions.
          # A list/parse failure must FAIL the step — only a successful list
          # that shows the project absent (exit 3) may trigger a create, so
          # auth/network/API errors are never masked by an unintended create.
          projects_json="$(npx wrangler@4 pages project list --json)"
          if printf '%s' "$projects_json" | node -e "
              const d = JSON.parse(require('fs').readFileSync(0, 'utf8'));
              if (!Array.isArray(d)) { console.error('unexpected wrangler project list shape'); process.exit(2); }
              const t = process.env.PAGES_PROJECT;
              process.exit(d.some(p => p && (p.name === t || p.project_name === t)) ? 0 : 3);
            "; then
            echo "Pages project ${PAGES_PROJECT} already exists"
          else
            status=$?
            if [ "$status" -ne 3 ]; then
              echo "Failed to inspect the Pages project list (exit ${status})" >&2
              exit "$status"
            fi
            npx wrangler@4 pages project create "${PAGES_PROJECT}" --production-branch=master
          fi

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@4 pages deploy dist --project-name="${PAGES_PROJECT}" --branch=master
